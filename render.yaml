services:
  - type: web
    name: te-pinta-api
    runtime: node
    plan: free
    region: oregon
    branch: main
    healthCheckPath: /health
    buildCommand: npx pnpm@10.10.0 install --frozen-lockfile && npx pnpm@10.10.0 --filter @te-pinta/shared build && npx pnpm@10.10.0 --filter @te-pinta/api build
    startCommand: npx pnpm@10.10.0 --filter @te-pinta/api start
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 24.14.1
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ALLOWED_ORIGIN
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: Admin Te Pinta
